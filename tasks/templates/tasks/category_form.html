{% extends "base.html" %}

{% block title %}{{ heading }}{% endblock %}

{% block content %}
    <a class="back-link" href="{% url 'category-list' %}">&larr; Back to categories</a>

    <div class="form-card">
        <h1>{{ heading }}</h1>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Save category</button>
                <a class="btn btn-secondary" href="{% url 'category-list' %}">Cancel</a>
            </div>
        </form>
    </div>
{% endblock %}
