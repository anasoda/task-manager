{% extends "base.html" %}

{% block title %}Edit Task{% endblock %}

{% block content %}
    <a class="back-link" href="{% url 'task-detail' task.pk %}">&larr; Back to task</a>

    <div class="form-card">
        <h1>Edit task</h1>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Update task</button>
                <a class="btn btn-secondary" href="{% url 'task-detail' task.pk %}">Cancel</a>
            </div>
        </form>
    </div>
{% endblock %}
