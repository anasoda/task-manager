{% extends "tasks/base.html" %}

{% block title %}New Task{% endblock %}

{% block content %}
    <a class="back-link" href="{% url 'task-list' %}">&larr; Back to tasks</a>

    <div class="form-card">
        <h1>New task</h1>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Save task</button>
                <a class="btn btn-secondary" href="{% url 'task-list' %}">Cancel</a>
            </div>
        </form>
    </div>
{% endblock %}
